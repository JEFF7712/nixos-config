$font = JetBrainsMono Nerd Font
$fg = rgb(eceff4)
$muted = rgb(aeb7c5)
$accent = rgb(88c0d0)
$surface = rgba(171b22d9)
$surface_alt = rgba(2e3440c8)
$border = rgba(88c0d0e6)
$error = rgba(bf616ae6)

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
}

animations {
    enabled = true
    bezier = smooth, 0.22, 1, 0.36, 1
    animation = fadeIn, 1, 4, smooth
    animation = fadeOut, 1, 4, smooth
    animation = inputFieldDots, 1, 2, smooth
}

background {
    monitor =
    path = screenshot
    blur_passes = 4
    blur_size = 7
    noise = 0.008
    contrast = 0.92
    brightness = 0.55
    vibrancy = 0.12
    vibrancy_darkness = 0.2
}

shape {
    monitor =
    size = 100%, 100%
    color = rgba(05070b66)
    rounding = 0
    position = 0, 0
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:1000] date +"%-I:%M"
    color = $fg
    font_size = 92
    font_family = $font
    position = 0, 172
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] date +"%A, %B %-d"
    color = $muted
    font_size = 22
    font_family = $font
    position = 0, 96
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = $fg
    font_size = 18
    font_family = $font
    position = 0, -70
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 360, 54
    outline_thickness = 2
    rounding = 10

    outer_color = $border
    inner_color = $surface
    font_color = $fg
    check_color = $accent
    fail_color = $error

    font_family = $font
    placeholder_text = Password
    fail_text = $PAMFAIL
    check_text = Checking...
    capslock_color = rgba(ebcb8be6)
    fade_on_empty = false
    dots_size = 0.24
    dots_spacing = 0.22
    shadow_passes = 2
    shadow_size = 4

    position = 0, -128
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:10000] bash -lc 'cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -n1 | sed "s/$/%/"'
    color = $muted
    font_size = 14
    font_family = $font
    position = 28, 26
    halign = left
    valign = bottom
}
