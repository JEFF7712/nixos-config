shell_integration no-rc

# BEGIN_KITTY_THEME
# Noctalia
include colors.conf
# END_KITTY_THEME

# BEGIN_KITTY_FONTS
font_family      family="Iosevka Nerd Font"
bold_font        auto
italic_font      auto
bold_italic_font auto

font_size 14

# END_KITTY_FONTS

background_opacity 0.48
enable_audio_bell no

# Bound scrollback memory (default 2000 lines held in RAM per window; long-lived
# sessions grew to GBs). Cap in-RAM scrollback and offload the rest to a pager
# temp file so a 20h terminal stays small.
scrollback_lines 10000
scrollback_pager_history_size 100
