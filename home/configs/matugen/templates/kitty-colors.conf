# tinted — monochrome, readable. Background is a DEEP tone of the main hue
# (primary_container) rather than the vivid primary: the vivid tone sits at
# mid-luminance and leaves no room for legible text. Foreground and ANSI come
# from the same hue family (on_primary_container / primary), comments from a
# dim neutral, and red is kept for errors. Verified >4.5 contrast (comments ~3).
cursor {{colors.primary.default.hex}}
cursor_text_color {{colors.on_primary.default.hex}}
foreground {{colors.on_primary_container.default.hex}}
background {{colors.primary_container.default.hex}}
selection_foreground {{colors.on_primary.default.hex}}
selection_background {{colors.primary.default.hex}}
color0  {{colors.on_primary_fixed.default.hex}}
color8  {{colors.outline.default.hex}}
color1  {{colors.error.default.hex}}
color9  {{colors.error.default.hex}}
color2  {{colors.on_primary_container.default.hex}}
color10 {{colors.primary.default.hex}}
color3  {{colors.primary.default.hex}}
