# Raw-output cava instance driving the topbar media-module visualizer.
# Parsed by CavaService.qml as newline-framed, semicolon-delimited bar values.

[general]
framerate = 60
bars = 12
autosens = 1

[input]
method = pulse
source = auto

[output]
method = raw
raw_target = /dev/stdout
data_format = ascii
ascii_max_range = 100
channels = mono
bar_delimiter = 59
frame_delimiter = 10

[smoothing]
noise_reduction = 0.77
