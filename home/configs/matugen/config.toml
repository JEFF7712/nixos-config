# matugen config for the wallpaper-driven `tinted` profile.
# Invoked by `apply_wallpaper_theme` (home/scripts/profile-common) as:
#   matugen color hex "#rrggbb" --mode <variant> -c ~/.config/matugen/config.toml
# Outputs land directly in the live runtime locations the profile scripts and
# the quickshell topbar read. Reloads are handled by the caller, not here.

[config]

[templates.quickshell]
input_path = "~/.config/matugen/templates/quickshell-theme.json"
output_path = "~/.config/desktop-profiles/runtime-quickshell-theme.json"

[templates.gtk3]
input_path = "~/.config/matugen/templates/gtk.css"
output_path = "~/.config/gtk-3.0/noctalia.css"

[templates.gtk4]
input_path = "~/.config/matugen/templates/gtk.css"
output_path = "~/.config/gtk-4.0/noctalia.css"

[templates.kitty]
input_path = "~/.config/matugen/templates/kitty-colors.conf"
output_path = "~/.config/kitty/colors.conf"

[templates.qt6]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt6ct/colors/noctalia.conf"

[templates.qt5]
input_path = "~/.config/matugen/templates/qtct-colors.conf"
output_path = "~/.config/qt5ct/colors/noctalia.conf"

[templates.fish]
input_path = "~/.config/matugen/templates/fish-theme.fish"
output_path = "~/.config/fish/conf.d/matugen_theme.fish"

[templates.starship]
input_path = "~/.config/matugen/templates/starship.toml"
output_path = "~/.config/starship_matugen.toml"

[templates.rofi]
input_path = "~/.config/matugen/templates/rofi-theme.rasi"
output_path = "~/.config/rofi/profile-switcher.rasi"

[templates.cava]
input_path = "~/.config/matugen/templates/cava-colors"
output_path = "~/.config/desktop-profiles/runtime-cava-colors"

[templates.btop]
input_path = "~/.config/matugen/templates/btop.theme"
output_path = "~/.config/btop/themes/profile.theme"

[templates.hyprlock]
input_path = "~/.config/matugen/templates/hyprlock-colors.conf"
output_path = "~/.config/hypr/profile-colors.conf"

[templates.tmux]
input_path = "~/.config/matugen/templates/tmux-colors.conf"
output_path = "~/.config/tmux/profile-colors.conf"

[templates.zathura]
input_path = "~/.config/matugen/templates/zathura-colors"
output_path = "~/.config/zathura/colors"
