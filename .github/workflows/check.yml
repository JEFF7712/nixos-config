name: Check
on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: cachix/install-nix-action@v30
        with:
          install_url: https://releases.nixos.org/nix/nix-2.34.6/install
          extra_nix_config: |
            accept-flake-config = true
      - uses: cachix/cachix-action@v15
        with:
          name: jeff7712
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      - name: Check flake
        run: nix flake check
      - name: Check formatting
        run: nix fmt -- --fail-on-change --no-cache
      - name: Agent checks
        run: |
          nix shell nixpkgs#just nixpkgs#ripgrep nixpkgs#fd nixpkgs#shellcheck -c \
            bash -c 'just check-agent-docs && just check-agent-workflows && just shell-check'
      - name: Profile and wallpaper checks
        run: |
          nix shell nixpkgs#just nixpkgs#jq nixpkgs#python3 nixpkgs#ripgrep -c \
            bash -c 'just wallpaper-script-check && just check-profiles'
      - name: QML lint
        run: nix shell nixpkgs#just -c just qml-lint
